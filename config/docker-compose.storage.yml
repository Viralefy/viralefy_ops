# MinIO single-instance — object storage S3-compatível.
#
# Loopback-only por design: MinIO escuta em 127.0.0.1 e Caddy NÃO expõe
# externamente. API local na VPS acessa direto via 127.0.0.1:9000.
# Backup-friendly: dados ficam em /var/lib/viralefy-storage que sobrevive
# ao viralefy-update destrutivo (igual ao Postgres em /var/lib/postgresql).
#
# Console admin em 127.0.0.1:9001 — admin liga via SSH tunnel se precisar
# inspecionar buckets manualmente. NÃO usar pra produção em escala — quando
# bater 100GB+ de proofs, migrar pra Cloudflare R2 (vide PHASE-7-PLAN.md).
#
# Credenciais via /etc/viralefy/.env (root:owned, 0600): STORAGE_ACCESS_KEY
# + STORAGE_SECRET_KEY. Instalador grava aleatoriamente no primeiro install
# e nunca rotaciona (POC env — vide [[no-secret-rotation-nag]]).

services:
  minio:
    image: minio/minio:latest
    container_name: viralefy-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${STORAGE_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${STORAGE_SECRET_KEY}"
      MINIO_BROWSER_REDIRECT_URL: "http://127.0.0.1:9001"
    volumes:
      - /var/lib/viralefy-storage:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # mc one-shot — cria buckets no startup. Idempotente: ignora se já existe.
  # Buckets policy private (signed URL pra download). Adicionar bucket novo
  # aqui basta — re-run docker compose up aplica.
  minio-init:
    image: minio/mc:latest
    container_name: viralefy-storage-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY} &&
      mc mb -p local/viralefy-proofs || true &&
      mc mb -p local/viralefy-public || true &&
      mc anonymous set download local/viralefy-public &&
      echo 'buckets ready: viralefy-proofs (private), viralefy-public (download)'
      "
