; Viralefy — Grafana minimal config.
;
; - Liga somente em 127.0.0.1:3000 (Caddy expõe via obs.viralefy.com).
; - Senha admin vem de GF_SECURITY_ADMIN_PASSWORD (env var no systemd unit).
; - Provisioning lê /etc/grafana/provisioning/{datasources,dashboards}.
; - Dados em /var/lib/grafana (sobrevive ao viralefy-update destrutivo).
;
; Tudo que não está aqui herda o default do pacote Debian.

app_mode = production
instance_name = viralefy

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
protocol = http
http_addr = 127.0.0.1
; Porta 3000 é do viralefy-front (Next.js). Grafana sobe em 3030 pra evitar
; conflito; Caddy faz o reverse-proxy em obs.viralefy.com → 127.0.0.1:3030.
http_port = 3030
domain = obs.viralefy.com
root_url = https://obs.viralefy.com/
enforce_domain = false
enable_gzip = true

[database]
type = sqlite3
path = grafana.db

[security]
; Senha real vem de GF_SECURITY_ADMIN_PASSWORD via systemd Environment=.
admin_user = admin
disable_initial_admin_creation = false
cookie_secure = true
cookie_samesite = lax
strict_transport_security = true
strict_transport_security_max_age_seconds = 31536000
strict_transport_security_subdomains = true
content_security_policy = true
x_content_type_options = true
x_xss_protection = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[log]
mode = console
level = info

[metrics]
enabled = true

[unified_alerting]
enabled = true

[feature_toggles]
enable = traceqlEditor

[news]
news_feed_enabled = false
