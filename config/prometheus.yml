# Viralefy — Prometheus scrape config.
# Dados em /var/lib/prometheus (sobrevive ao viralefy-update destrutivo).
# Liga somente em 127.0.0.1:9090.
#
# Retention é controlada via flag no systemd unit (--storage.tsdb.retention.time).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: viralefy
    instance: prod

# Tempo metrics-generator faz remote_write pra cá; aceita exemplars.
# (Habilitado via flag --enable-feature=remote-write-receiver no systemd unit.)

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/prometheus-alerts.yml
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [127.0.0.1:9090]

  - job_name: node
    static_configs:
      - targets: [127.0.0.1:9100]
        labels:
          host: viralefy

  # viralefy-api LEGACY parada em soak (PHASE-9). Reativar removendo este comentário.
  # (era job_name: viralefy-api, targets [127.0.0.1:8080], service=viralefy-api)

  - job_name: viralefy-front
    metrics_path: /api/metrics
    static_configs:
      - targets: [127.0.0.1:3000]
        labels:
          service: viralefy-front

  - job_name: viralefy-backoffice
    metrics_path: /api/metrics
    static_configs:
      - targets: [127.0.0.1:3001]
        labels:
          service: viralefy-backoffice

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:3030]
        labels:
          service: grafana

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:3100]
        labels:
          service: loki

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:3200]
        labels:
          service: tempo

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:12345]
        labels:
          service: alloy

  # ---- PHASE-9 microservices ----
  - job_name: viralefy-core
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:8084]
        labels:
          service: viralefy-core

  - job_name: viralefy-dispatcher
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:8090]
        labels:
          service: viralefy-dispatcher

  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:2019]
        labels:
          service: caddy

  # Postgres exporter (prometheus-community/postgres_exporter), instalado
  # via installer/80-observability.sh. Roda como user postgres, lê o DSN
  # do EnvironmentFile /etc/viralefy/postgres-exporter.env.
  - job_name: postgres-exporter
    metrics_path: /metrics
    static_configs:
      - targets: [127.0.0.1:9187]
        labels:
          service: postgres-exporter

  # /internal/metrics expostos pelos 3 microservices via promhttp (loopback-only).
  # Mesma nomenclatura de métricas do viralefy-core (http_requests_total,
  # http_request_duration_seconds, db_query_duration_seconds) — dashboards
  # do core funcionam filtrando por label `service`.
  - job_name: viralefy-auth
    metrics_path: /internal/metrics
    static_configs:
      - targets: [127.0.0.1:8083]
        labels:
          service: viralefy-auth

  - job_name: viralefy-payments
    metrics_path: /internal/metrics
    static_configs:
      - targets: [127.0.0.1:8081]
        labels:
          service: viralefy-payments

  - job_name: viralefy-sender
    metrics_path: /internal/metrics
    static_configs:
      - targets: [127.0.0.1:8082]
        labels:
          service: viralefy-sender
