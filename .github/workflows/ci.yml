name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck installer + bin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck >/dev/null
          # SC1090/1091 = source dinâmico (env file); SC2086 = quoting opt-in;
          # SC2034 = vars exportadas para subscripts via `set -a`; SC2012 = ls
          # tudo justificado pelo design do bootstrap.
          shellcheck -x -e SC1090,SC1091,SC2086,SC2034,SC2012 bin/* installer/*.sh

  syntax-systemd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: systemd-analyze syntax
        run: |
          # systemd-analyze verify exige caminhos absolutos das ExecStart
          # — válido só dentro do host de produção. Aqui só checamos parse
          # do ini fazendo systemd-analyze cat-config emulation via grep
          # básico das chaves obrigatórias.
          for u in systemd/*.service systemd/*.timer; do
            grep -q "^\[Unit\]" "$u" || { echo "FAIL $u missing [Unit]"; exit 1; }
          done
          echo "ok"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
